# Host nginx site for Logstack API on a shared EC2 instance.
# Install: sudo cp infra/nginx/host-api.logstack.tech.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/host-api.logstack.tech.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d api.logstack.tech

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.logstack.tech;

    client_max_body_size 10m;

    # WebSocket streams — MUST set Upgrade headers (dashboard + mobile)
    location ~ ^/v1/(stream|mobile/stream)$ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Legacy /api/v1/* → /v1/* (REST only; WS clients should use /v1/stream)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

# After certbot, it will add a listen 443 ssl server block for this domain.
# Copy the WebSocket location into the 443 block (or use include).
