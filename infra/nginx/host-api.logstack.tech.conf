# Host nginx site for Logstack API on a shared EC2 instance.
# Install: sudo cp infra/nginx/host-api.logstack.tech.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/host-api.logstack.tech.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d api.logstack.tech

server {
    listen 80;
    server_name api.logstack.tech;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
    }
}

# After certbot, it will add a listen 443 ssl server block for this domain.