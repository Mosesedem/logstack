# API-only reverse proxy for Logstack production (no web frontend).
# Terminates TLS and proxies to the api service on the Docker network (api:8080).
# Paths are passed through as-is: /v1/*, /health, /ready (no /api prefix rewrite).

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript;

    upstream logstack_api {
        server api:8080;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=1000r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP — ACME challenges + redirect everything else to HTTPS
    server {
        listen 80;
        server_name api.logstack.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — public API
    server {
        listen 443 ssl http2;
        server_name api.logstack.tech;

        ssl_certificate /etc/letsencrypt/live/api.logstack.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.logstack.tech/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health (ALB / uptime checks)
        location = /health {
            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /ready {
            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        # Log ingest — higher rate limit + larger bodies
        location = /v1/logs {
            limit_req zone=ingest_limit burst=500 nodelay;
            client_max_body_size 10m;

            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # WebSocket streams (dashboard + mobile)
        location ~ ^/v1/(stream|mobile/stream)$ {
            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # All other API routes
        location /v1/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Backward compat if anything still calls /api/v1/*
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://logstack_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            return 404;
        }
    }
}