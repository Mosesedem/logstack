# Temporary HTTP-only nginx for initial Let's Encrypt certificate issuance.
# Used by scripts/setup-ssl.sh before switching to nginx.api.conf.

events {
    worker_connections 256;
}

http {
    server {
        listen 80;
        server_name api.logstack.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'Logstack API — awaiting TLS certificate\n';
            add_header Content-Type text/plain;
        }
    }
}