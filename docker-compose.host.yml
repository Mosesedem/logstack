# Full stack on a shared EC2 host: API + Postgres + Redis (Docker network only for DB/Redis).
# Host nginx on 80/443 proxies to 127.0.0.1:8082 (see infra/nginx/host-api.logstack.tech.conf).
#
# Usage:
#   docker compose -f docker-compose.host.yml up -d --build

services:
  api:
    build:
      context: ./packages/logstack-go
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8082}:8080"
    env_file:
      - .env
    volumes:
      # Mount FCM service account (read-only). File must exist on host at this path.
      - /etc/logstack/secrets/firebase-service-account.json:/etc/logstack/secrets/firebase-service-account.json:ro
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-logstack}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-logstack}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - ENV=${ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - BASE_URL=${BASE_URL:-https://api.logstack.tech}
      - PAYSTACK_WEBHOOK_URL=${PAYSTACK_WEBHOOK_URL:-https://api.logstack.tech/v1/webhooks/paystack}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_JSON=${LOG_JSON:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-logstack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-logstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logstack} -d ${POSTGRES_DB:-logstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    name: logstack_postgres_data
  redis_data:
    name: logstack_redis_data