services:
  # Full-stack example for AWS EC2 / single host Docker Compose
  # Web (Next.js) + API (Go) + Postgres + Redis. Front with nginx if desired (see infra/nginx).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # IMPORTANT: For browser clients use your *public* URL (domain or EC2 IP).
      # Inside Docker network the API is reachable as http://api:8080/v1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8080/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://api:8080/v1/stream}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-prod}
      - NEXT_PUBLIC_LOGSTACK_API_KEY=${NEXT_PUBLIC_LOGSTACK_API_KEY:-}
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./packages/logstack-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://logstack:logstack@postgres:5432/logstack?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - PORT=8080
      - ENV=${ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://web:3000}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH:-}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY:-}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=logstack
      - POSTGRES_PASSWORD=logstack
      - POSTGRES_DB=logstack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
