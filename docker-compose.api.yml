# API-only stack for EC2 production (no web frontend).
# Usage: docker compose -f docker-compose.api.yml up -d --build
#
# Host port mapping: the API container always listens on 8080 internally.
# Set API_HOST_PORT in .env when common ports (8080, 3000, etc.) are taken on the host.
# Postgres and Redis stay on the Docker network only — no host ports published.

services:
  api:
    build:
      context: ./packages/logstack-go
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-8082}:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://logstack:logstack@postgres:5432/logstack?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - PORT=8080
      - ENV=${ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - BASE_URL=${BASE_URL:-https://api.logstack.tech}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH:-}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID:-}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY:-}
      - PAYSTACK_WEBHOOK_URL=${PAYSTACK_WEBHOOK_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_JSON=${LOG_JSON:-true}
    volumes:
      # Mount FCM service account (read-only). File must exist on host.
      - /etc/logstack/secrets/firebase-service-account.json:/etc/logstack/secrets/firebase-service-account.json:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-logstack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logstack}
      - POSTGRES_DB=${POSTGRES_DB:-logstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: