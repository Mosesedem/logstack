name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/logstack-go/**"
      - "docker-compose.host.yml"
      - "docker-compose.prod.yml"
      - "docker-compose.api.yml"
      - "infra/**"
      - "scripts/deploy-ec2.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  COMPOSE_FILE: docker-compose.host.yml
  API_DOMAIN: api.logstack.tech

jobs:
  build-api:
    name: Verify API Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build API image (CI gate)
        uses: docker/build-push-action@v5
        with:
          context: ./packages/logstack-go
          file: ./packages/logstack-go/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy API to EC2
    needs: build-api
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_KEY:-}" ] || [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ]; then
            echo "::error::Missing DEPLOY_KEY, DEPLOY_HOST, or DEPLOY_USER repository secret." >&2
            echo "Run scripts/setup-github-deploy.sh on the server, then add secrets — see docs/AWS_PRODUCTION.md" >&2
            exit 1
          fi

          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/logstack}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' COMPOSE_FILE='$COMPOSE_FILE' API_DOMAIN='$API_DOMAIN' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing .env on server" >&2
            exit 1
          fi

          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          docker compose -f "$COMPOSE_FILE" up -d --build --remove-orphans
          docker compose -f "$COMPOSE_FILE" ps

          for i in $(seq 1 30); do
            if curl -fsS --max-time 3 "http://127.0.0.1:8082/health" >/dev/null 2>&1; then
              echo "Local health OK"
              break
            fi
            sleep 2
          done

          curl -fsS --max-time 15 "https://${API_DOMAIN}/health"
          echo ""
          curl -fsS --max-time 15 "https://${API_DOMAIN}/ready"
          echo ""
          echo "Deploy finished at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          EOF

          rm -f ~/.ssh/deploy_key
          echo "API deployment complete!"