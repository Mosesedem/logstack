name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/logstack-go/**"
      - "docker-compose.prod.yml"
      - "docker-compose.api.yml"
      - "infra/**"
      - "scripts/deploy-ec2.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/logstack-go
          file: ./packages/logstack-go/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy API to EC2
    needs: build-and-push-api
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_KEY:-}" ] || [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ]; then
            echo "Missing DEPLOY_KEY, DEPLOY_HOST, or DEPLOY_USER secret" >&2
            exit 1
          fi

          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/logstack}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$DEPLOY_PATH COMPOSE_FILE=docker-compose.prod.yml API_DOMAIN=api.logstack.tech bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -f docker-compose.prod.yml ps
          curl -fsS --max-time 15 https://api.logstack.tech/health || echo "HTTPS health check skipped or failed"
          EOF

          rm -f ~/.ssh/deploy_key
          echo "API deployment complete!"