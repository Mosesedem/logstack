name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: packages/logstack-go/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and test Go API
        run: |
          cd packages/logstack-go
          go mod tidy
          go vet ./...
          go test ./... -count=1

      - name: Build Go API binary
        run: |
          cd packages/logstack-go
          go build -o /tmp/server cmd/server/main.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./packages/logstack-go
          file: ./packages/logstack-go/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build JS SDK
        run: pnpm --filter logstack-js build

      - name: Lint web dashboard
        run: pnpm --filter @logstack/web lint

      - name: Build web dashboard
        run: pnpm --filter @logstack/web build