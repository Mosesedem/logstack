[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "logstack-py"
version = "1.0.1"
description = "A Python SDK for the Logstack logging platform"
readme = "README.md"
requires-python = ">=3.7"
license = { text = "MIT" }
authors = [{ name = "Mosesedem", email = "team@logstack.tech" }]
keywords = ["logstack", "logging", "logs", "monitoring", "observability"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
django = ["django>=3.2"]
fastapi = ["fastapi>=0.95.0"]
async = ["aiohttp>=3.8.0"]

[project.urls]
Homepage = "https://github.com/Mosesedem/logstack"
Repository = "https://github.com/Mosesedem/logstack"
Issues = "https://github.com/Mosesedem/logstack/issues"

[tool.setuptools.packages.find]
include = ["logstack*"]
